openapi: 3.0.3
info:
  title: Servicio Mensajería API
  version: 1.0.0
  description: |
    Microservicio de chat directo, chat grupal y entrega de mensajes en tiempo real.
    Soporta texto, imágenes, videos cortos y mensajes de voz.
    Tecnología: Java 8 + Spring Boot 2.7.x + WebSocket

servers:
  - url: http://localhost:8091
    description: Desarrollo local
  - url: https://api.spartangoldengym.com
    description: Producción (vía API Gateway)

security:
  - BearerAuth: []

paths:
  /api/messages/conversations:
    get:
      tags: [Conversaciones]
      summary: Listar conversaciones del usuario
      operationId: listConversations
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [direct, group]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de conversaciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConversationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/messages/conversations/{id}:
    get:
      tags: [Conversaciones]
      summary: Historial de conversación
      operationId: getConversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: before
          in: query
          description: Cursor para paginación (messageId)
          schema:
            type: string
      responses:
        '200':
          description: Mensajes de la conversación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/messages/send:
    post:
      tags: [Mensajes]
      summary: Enviar mensaje
      operationId: sendMessage
      description: Entrega en máximo 1 segundo vía WebSocket. Si el destinatario está offline, se envía push.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Mensaje enviado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /ws/chat:
    get:
      tags: [WebSocket]
      summary: Canal de chat en tiempo real (WebSocket)
      operationId: chatWebSocket
      description: |
        Conexión WebSocket para chat en tiempo real.
        Protocolo: ws:// o wss://
        Eventos entrantes: message, typing, read_receipt
        Eventos salientes: new_message, message_read, user_typing
      responses:
        '101':
          description: Switching Protocols - WebSocket upgrade

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    ConversationResponse:
      type: object
      properties:
        conversationId:
          type: string
        type:
          type: string
          enum: [direct, group]
        participantIds:
          type: array
          items:
            type: string
            format: uuid
        lastMessage:
          type: string
        lastMessageAt:
          type: string
          format: date-time
        unreadCount:
          type: integer

    ConversationDetailResponse:
      type: object
      properties:
        conversationId:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/MessageResponse'
        hasMore:
          type: boolean

    SendMessageRequest:
      type: object
      required: [conversationId, contentType]
      properties:
        conversationId:
          type: string
        contentType:
          type: string
          enum: [text, image, video, voice]
        content:
          type: string
          description: Texto del mensaje o URL del archivo multimedia
        mediaUrl:
          type: string
          description: URL del archivo en S3 (para imagen, video, voz)

    MessageResponse:
      type: object
      properties:
        messageId:
          type: string
        conversationId:
          type: string
        senderId:
          type: string
          format: uuid
        contentType:
          type: string
        content:
          type: string
        mediaUrl:
          type: string
        status:
          type: string
          enum: [sent, delivered, read]
        sentAt:
          type: string
          format: date-time
        readAt:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Solicitud inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: No autenticado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
