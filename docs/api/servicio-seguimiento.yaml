openapi: 3.0.3
info:
  title: Servicio Seguimiento API
  version: 1.0.0
  description: |
    Microservicio de seguimiento en tiempo real de entrenamientos, datos biométricos y wearables.
    Tecnología: Java 8 + Spring Boot 2.7.x

servers:
  - url: http://localhost:8084
    description: Desarrollo local
  - url: https://api.spartangoldengym.com
    description: Producción (vía API Gateway)

security:
  - BearerAuth: []

paths:
  /api/workouts/start:
    post:
      tags: [Entrenamientos]
      summary: Iniciar sesión de entrenamiento
      operationId: startWorkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartWorkoutRequest'
      responses:
        '201':
          description: Sesión de entrenamiento creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/workouts/{id}/sets:
    post:
      tags: [Entrenamientos]
      summary: Registrar serie completada
      operationId: recordSet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordSetRequest'
      responses:
        '201':
          description: Serie registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutSetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/workouts/{id}/heartrate:
    post:
      tags: [Biométricos]
      summary: Registrar frecuencia cardíaca
      operationId: recordHeartRate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HeartRateRequest'
      responses:
        '201':
          description: Datos de frecuencia cardíaca registrados
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/workouts/{id}/complete:
    post:
      tags: [Entrenamientos]
      summary: Finalizar entrenamiento
      operationId: completeWorkout
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Entrenamiento finalizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/workouts/history:
    get:
      tags: [Historial]
      summary: Historial de entrenamientos
      operationId: getWorkoutHistory
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Historial de entrenamientos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkoutSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/workouts/progress:
    get:
      tags: [Progreso]
      summary: Métricas de progreso
      operationId: getProgress
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month, year, custom]
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Métricas de progreso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/wearables/connect:
    post:
      tags: [Wearables]
      summary: Conectar dispositivo wearable
      operationId: connectWearable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectWearableRequest'
      responses:
        '200':
          description: Wearable conectado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WearableResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/wearables/sync:
    post:
      tags: [Wearables]
      summary: Sincronizar datos pendientes del wearable
      operationId: syncWearable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WearableSyncRequest'
      responses:
        '200':
          description: Datos sincronizados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WearableSyncResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    StartWorkoutRequest:
      type: object
      properties:
        planId:
          type: string
          format: uuid
        routineId:
          type: string
          format: uuid

    WorkoutSessionResponse:
      type: object
      properties:
        sessionId:
          type: string
        userId:
          type: string
          format: uuid
        startedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, completed, cancelled]

    RecordSetRequest:
      type: object
      required: [exerciseId, weight, reps]
      properties:
        exerciseId:
          type: string
          format: uuid
        weight:
          type: number
          format: double
        reps:
          type: integer
        restSeconds:
          type: integer

    WorkoutSetResponse:
      type: object
      properties:
        setId:
          type: string
        exerciseId:
          type: string
          format: uuid
        weight:
          type: number
          format: double
        reps:
          type: integer
        restSeconds:
          type: integer
        timestamp:
          type: string
          format: date-time

    HeartRateRequest:
      type: object
      required: [bpm]
      properties:
        bpm:
          type: integer
          minimum: 30
          maximum: 250
        deviceType:
          type: string
        timestamp:
          type: string
          format: date-time

    WorkoutSummaryResponse:
      type: object
      properties:
        sessionId:
          type: string
        userId:
          type: string
          format: uuid
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        totalDuration:
          type: integer
          description: Duración en segundos
        caloriesBurned:
          type: integer
        totalSets:
          type: integer
        totalVolume:
          type: number
          format: double
          description: Volumen total (peso x reps)
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/WorkoutSetResponse'

    ProgressResponse:
      type: object
      properties:
        totalWorkouts:
          type: integer
        totalDuration:
          type: integer
        totalCalories:
          type: integer
        totalVolume:
          type: number
          format: double
        averageHeartRate:
          type: integer
        workoutsByDay:
          type: object
          additionalProperties:
            type: integer

    ConnectWearableRequest:
      type: object
      required: [deviceType, deviceId]
      properties:
        deviceType:
          type: string
          enum: [apple_watch, fitbit, garmin, huawei]
        deviceId:
          type: string
        authToken:
          type: string

    WearableResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        deviceType:
          type: string
        deviceId:
          type: string
        connectedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [connected, disconnected]

    WearableSyncRequest:
      type: object
      required: [deviceId, data]
      properties:
        deviceId:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/BiometricDataPoint'

    BiometricDataPoint:
      type: object
      properties:
        type:
          type: string
          enum: [heart_rate, steps, calories, sleep]
        value:
          type: number
          format: double
        timestamp:
          type: string
          format: date-time

    WearableSyncResponse:
      type: object
      properties:
        syncedRecords:
          type: integer
        lastSyncAt:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Solicitud inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: No autenticado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
