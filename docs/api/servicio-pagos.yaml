openapi: 3.0.3
info:
  title: Servicio Pagos API
  version: 1.0.0
  description: |
    Microservicio de suscripciones, membresías, pagos, reembolsos y donaciones.
    Integra Stripe, Adyen y PayPal. Cumple PCI DSS.
    Tecnología: Java 8 + Spring Boot 2.7.x

servers:
  - url: http://localhost:8088
    description: Desarrollo local
  - url: https://api.spartangoldengym.com
    description: Producción (vía API Gateway)

security:
  - BearerAuth: []

paths:
  /api/payments/subscribe:
    post:
      tags: [Suscripciones]
      summary: Suscribirse a un plan
      operationId: subscribe
      description: Procesa el pago y activa la membresía en máximo 10 segundos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
      responses:
        '201':
          description: Suscripción creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/payments/transactions:
    get:
      tags: [Transacciones]
      summary: Historial de transacciones
      operationId: getTransactions
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: type
          in: query
          schema:
            type: string
            enum: [subscription, refund, donation]
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de transacciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/payments/refund:
    post:
      tags: [Reembolsos]
      summary: Solicitar reembolso
      operationId: requestRefund
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
      responses:
        '200':
          description: Reembolso procesado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/payments/donations:
    post:
      tags: [Donaciones]
      summary: Realizar donación a creador de contenido (PayPal)
      operationId: makeDonation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DonationRequest'
      responses:
        '201':
          description: Donación procesada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DonationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/payments/methods:
    get:
      tags: [Métodos de Pago]
      summary: Listar métodos de pago del usuario
      operationId: getPaymentMethods
      responses:
        '200':
          description: Métodos de pago
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentMethodResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Métodos de Pago]
      summary: Agregar método de pago
      operationId: addPaymentMethod
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPaymentMethodRequest'
      responses:
        '201':
          description: Método de pago agregado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethodResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Métodos de Pago]
      summary: Eliminar método de pago
      operationId: deletePaymentMethod
      parameters:
        - name: methodId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Método de pago eliminado
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    SubscribeRequest:
      type: object
      required: [planType, paymentProvider, paymentMethodId]
      properties:
        planType:
          type: string
          enum: [basic, premium, elite]
        paymentProvider:
          type: string
          enum: [stripe, adyen]
        paymentMethodId:
          type: string

    SubscriptionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        planType:
          type: string
        status:
          type: string
          enum: [active, suspended, cancelled, expired]
        paymentProvider:
          type: string
        startedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    TransactionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        currency:
          type: string
        type:
          type: string
          enum: [subscription, refund, donation]
        status:
          type: string
          enum: [completed, pending, failed, refunded]
        paymentProvider:
          type: string
        createdAt:
          type: string
          format: date-time

    TransactionListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/TransactionResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    RefundRequest:
      type: object
      required: [transactionId, reason]
      properties:
        transactionId:
          type: string
          format: uuid
        reason:
          type: string

    RefundResponse:
      type: object
      properties:
        refundId:
          type: string
          format: uuid
        originalTransactionId:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        status:
          type: string
          enum: [processed, pending]

    DonationRequest:
      type: object
      required: [creatorId, amount, currency]
      properties:
        creatorId:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          minimum: 1.0
        currency:
          type: string
          default: USD
        message:
          type: string
          maxLength: 500

    DonationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        donorId:
          type: string
          format: uuid
        creatorId:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        currency:
          type: string
        paypalTransactionId:
          type: string
        createdAt:
          type: string
          format: date-time

    PaymentMethodResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [credit_card, debit_card]
        provider:
          type: string
        last4:
          type: string
        expiryMonth:
          type: integer
        expiryYear:
          type: integer
        isDefault:
          type: boolean

    AddPaymentMethodRequest:
      type: object
      required: [provider, token]
      properties:
        provider:
          type: string
          enum: [stripe, adyen]
        token:
          type: string
          description: Token de pago generado por el SDK del proveedor
        setAsDefault:
          type: boolean
          default: false

  responses:
    BadRequest:
      description: Solicitud inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: No autenticado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Suscripción activa ya existe
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Pasarela de pago no disponible
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
