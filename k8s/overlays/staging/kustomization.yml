apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: spartan-gym-staging

resources:
  - ../../base/namespace.yml

patches:
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: HorizontalPodAutoscaler
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 6
